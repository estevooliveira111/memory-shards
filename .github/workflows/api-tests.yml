name: API Tests

on:
  push:
    branches: [main]
    paths:
      - "Api/**"
      - "Api.Tests/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "Api/**"
      - "Api.Tests/**"
      - ".github/workflows/api-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Api.Tests/Api.Tests.csproj

      - name: Build
        run: dotnet build Api.Tests/Api.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Api.Tests/Api.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Test Results
          path: "**/test-results.trx"
          reporter: dotnet-trx
